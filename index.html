<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rachel's Study Hub — Login</title>
<link rel="stylesheet" href="styles/shared.css">
<style>
  /* radial glow center */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79,142,247,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  p::before { content: "→ "; }
  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .brand {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .brand-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    color: #fff;
    line-height: 1.1;
  }

  .brand h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .brand p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.6s 0.15s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.1em;
    outline: none;
    padding: 13px 48px 13px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input[type="password"].shake {
    animation: shake 0.4s ease;
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(247,111,111,0.12);
  }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--text); }

  .error-msg {
    color: var(--error);
    font-size: 13px;
    margin-top: 8px;
    min-height: 18px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .error-msg.show { opacity: 1; }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 14px;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    opacity: 0.9;
    box-shadow: 0 4px 20px rgba(79,142,247,0.35);
    transform: translateY(-1px);
  }

  .submit-btn:active { transform: translateY(0); }

  .submit-btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  .submit-btn .btn-text { transition: opacity 0.2s; }
  .submit-btn.loading .btn-text { opacity: 0; }

  .spinner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: none;
  }
  .submit-btn.loading .spinner {
    opacity: 1;
    animation: spin 0.6s linear infinite;
  }

  .footer-note {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    animation: fadeUp 0.6s 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-5px); }
    80%       { transform: translateX(5px); }
  }

  @keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-eyebrow">Study Hub</div>
    <h1>My <em>Study Guides</em></h1>
    <p>Rachel's personal study workspace</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="pw">Password</label>
      <div class="input-wrap">
        <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" autofocus>
        <button class="eye-btn" id="eye-btn" onclick="toggleVisibility()" tabindex="-1" aria-label="Toggle visibility">👁</button>
      </div>
      <div class="error-msg" id="error-msg">Incorrect password. Try again.</div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="login()">
      <span class="btn-text">Enter Study Hub →</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="footer-note">
    Software Engineering &nbsp;·&nbsp; Personal Use Only
  </div>
</div>

<script>
  const CORRECT = 'password123';

  const pwInput   = document.getElementById('pw');
  const errorMsg  = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');

  // Check if already authenticated this session
  if (sessionStorage.getItem('studyhub_auth') === '1') {
    window.location.replace('app.html');
  }

  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function login() {
    const val = pwInput.value.trim();
    errorMsg.classList.remove('show');

    if (val === CORRECT) {
      submitBtn.classList.add('loading');
      sessionStorage.setItem('studyhub_auth', '1');
      setTimeout(() => window.location.replace('app.html'), 600);
    } else {
      pwInput.classList.add('shake');
      errorMsg.classList.add('show');
      setTimeout(() => pwInput.classList.remove('shake'), 400);
      pwInput.select();
    }
  }

  function toggleVisibility() {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
